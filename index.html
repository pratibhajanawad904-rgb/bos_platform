<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B'OS Platform</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        .dashboard-container { display: flex; flex-wrap: wrap; gap: 20px; max-width: 1200px; margin: 0 auto; }
        .card { background: white; border-radius: 8px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); flex: 1; min-width: 300px; }
        .btn { background-color: #1b4d3e; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; font-size: 14px; }
        .btn:hover { background-color: #143a2e; }
        .btn-blue { background-color: #007bff; }
        .btn-blue:hover { background-color: #0056b3; }
        .lang-bar { display: flex; gap: 10px; margin-bottom: 20px; justify-content: flex-end; max-width: 1200px; margin: 0 auto 20px auto; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input, .form-group select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .advisory-box { background-color: #fff8e7; padding: 15px; border-left: 4px solid #1b4d3e; margin-top: 15px; border-radius: 0 4px 4px 0; font-size: 14px; line-height: 1.6; white-space: pre-line; }
        .plot-card { border-bottom: 1px solid #eee; padding-bottom: 15px; margin-bottom: 15px; }
        .plot-card:last-child { border-bottom: none; }
        .verification-badge { background-color: #e6f4ea; color: #137333; padding: 8px 12px; border-radius: 4px; font-weight: bold; margin-bottom: 15px; display: flex; align-items: center; gap: 5px; }
    </style>
</head>
<body>

    <div class="lang-bar">
        <button class="btn" onclick="setLanguage('en')">English</button>
        <button class="btn" onclick="setLanguage('mr')">मराठी</button>
        <button class="btn" onclick="setLanguage('kn')">ಕನ್ನಡ</button>
        <button class="btn" onclick="setLanguage('te')">తెలుగు</button>
    </div>

    <div class="dashboard-container">
        <div class="card">
            <h2 id="reg-title">ಹೊಲದ ಮಾಹಿತಿ ನೋಂದಣಿ / Plot Registration</h2>
            
            <div class="form-group">
                <label id="lbl-verify">ಮೊಬೈಲ್ ದೃಢೀಕರಣ / Mobile Verification</label>
                <input type="text" id="verify-phone" placeholder="10-digit number">
                <button class="btn btn-blue" style="margin-top: 8px; width: 100%;">OTP ವಿನಂತಿಸಿ / Request OTP</button>
            </div>
            
            <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">

            <div class="form-group">
                <label id="lbl-name">ರೈತರ ಹೆಸರು / Farmer Name</label>
                <input type="text" id="farmer-name">
            </div>
            <div class="form-group">
                <label id="lbl-phone">ಮೊಬೈಲ್ ಸಂಖ್ಯೆ / Mobile Number</label>
                <input type="text" id="farmer-phone">
            </div>
            <div class="form-group">
                <label id="lbl-crop">ಬೆಳೆ ಮಾದರಿ / Crop Type</label>
                <select id="crop-type">
                    <option value="sugarcane">ಕಬ್ಬು / Sugarcane</option>
                </select>
            </div>
            <div class="form-group">
                <label id="lbl-date">ಬಿತ್ತನೆ ದಿನಾಂಕ / Sowing Date</label>
                <input type="date" id="sowing-date">
            </div>
            <div class="form-group">
                <label id="lbl-acreage">ಎಕರೆ ವಿಸ್ತೀರ್ಣ / Acreage</label>
                <input type="number" id="acreage-val">
            </div>
            <button class="btn" style="width: 100%; font-size: 16px; background-color: #137333;" onclick="handleRegistration()">ಜಮೀನು ನೋಂದಾಯಿಸಿ / Register Layout</button>
        </div>

        <div class="card">
            <h2 id="dash-title">ಸಕ್ರಿಯ ಪ್ಲಾಟ್‌ಗಳು / Active Regional Plots</h2>
            <div class="verification-badge" id="verify-status">
                ✅ ದೃಢೀಕರಿಸಲಾಗಿದೆ: ದಾಖಲೆಗಳನ್ನು ಪ್ರದರ್ಶಿಸಲಾಗುತ್ತಿದೆ (+91 8618734070)
            </div>
            
            <div id="plots-container"></div>

            <h3 style="margin-top: 30px;" id="log-title">ಸಂವಹನ ಲಾಗ್ / Communication Log</h3>
            <textarea id="comm-log" style="width: 100%; height: 100px; border-radius: 4px; border: 1px solid #ccc; padding: 10px;" readonly></textarea>
        </div>
    </div>

    <script>
        const API_BASE_URL = "https://bos-app.onrender.com";
        let activeLanguage = 'en';

        // Dictionary to instantly switch UI labels without breaking backend connection
        const uiLabels = {
            en: { reg: "Plot Registration", verify: "Mobile Verification", name: "Farmer Name", phone: "Mobile Number", crop: "Crop Type", date: "Sowing Date", acreage: "Acreage", dash: "Active Regional Plots", log: "Communication Log" },
            kn: { reg: "ಹೊಲದ ಮಾಹಿತಿ ನೋಂದಣಿ", verify: "ಮೊಬೈಲ್ ದೃಢೀಕರಣ", name: "ರೈತರ ಹೆಸರು", phone: "ಮೊಬೈಲ್ ಸಂಖ್ಯೆ", crop: "ಬೆಳೆ ಮಾದರಿ", date: "ಬಿತ್ತನೆ ದಿನಾಂಕ", acreage: "ಎಕರೆ ವಿಸ್ತೀರ್ಣ", dash: "ಸಕ್ರಿಯ ಪ್ಲಾಟ್‌ಗಳು", log: "ಸಂವಹನ ಲಾಗ್" },
            mr: { reg: "प्लॉट नोंदणी", verify: "मोबाईल पडताळणी", name: "शेतकऱ्याचे नाव", phone: "मोबाईल नंबर", crop: "पिकाचा प्रकार", date: "पेरणीची तारीख", acreage: "एकर क्षेत्र", dash: "सक्रिय प्लॉट", log: "संभाषण लॉग" },
            te: { reg: "ప్లాట్ రిజిస్ట్రేషన్", verify: "మొబైల్ వెరిఫికేషన్", name: "రైతు పేరు", phone: "మొబైల్ సంఖ్య", crop: "పంట రకం", date: "విత్తన తేదీ", acreage: "ఎకరాల వైశాల్యం", dash: "క్రియాశీల ప్లాట్లు", log: "కమ్యూనికేషన్ లాగ్" }
        };

        function setLanguage(langCode) {
            activeLanguage = langCode;
            document.documentElement.lang = langCode;
            
            // Translate the static dashboard UI headers instantly
            const labels = uiLabels[langCode] || uiLabels.en;
            document.getElementById('reg-title').innerText = labels.reg;
            document.getElementById('lbl-verify').innerText = labels.verify;
            document.getElementById('lbl-name').innerText = labels.name;
            document.getElementById('lbl-phone').innerText = labels.phone;
            document.getElementById('lbl-crop').innerText = labels.crop;
            document.getElementById('lbl-date').innerText = labels.date;
            document.getElementById('lbl-acreage').innerText = labels.acreage;
            document.getElementById('dash-title').innerText = labels.dash;
            document.getElementById('log-title').innerText = labels.log;

            console.log("UI set to: " + langCode + ". Triggering dynamic database fetch...");
            syncPlotsData();
        }

        async function handleRegistration() {
    const name = document.getElementById('farmer-name').value;
    const phone = document.getElementById('farmer-phone').value;
    const crop = document.getElementById('crop-type').value;
    const date = document.getElementById('sowing-date').value;
    const acreage = document.getElementById('acreage-val').value;

    if (!name || !phone || !date || !acreage) {
        alert("Please fill all fields");
        return;
    }

    try {
        console.log("Submitting registration for:", name);
        
        const response = await fetch(`${API_BASE_URL}/api/plots`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                farmer_name: name, 
                phone_number: phone,  // Fixed: explicitly matches the backend field name!
                crop: crop, 
                acreage: parseInt(acreage), 
                date: date, 
                lang: activeLanguage 
            })
        });

        if (!response.ok) {
            throw new Error(`Server returned status: ${response.status}`);
        }

        const resData = await response.json();
        console.log("Registration response:", resData);
        
        // Instantly refresh cards so the farmer sees their record immediately
        await syncPlotsData();
        
        // Clear out the input values so the form resets cleanly
        document.getElementById('farmer-name').value = "";
        document.getElementById('farmer-phone').value = "";
        document.getElementById('sowing-date').value = "";
        document.getElementById('acreage-val').value = "";
        
        alert("Registration Successful!");
        
    } catch (err) {
        console.error("Error saving data:", err);
        alert("Server error occurred while registering the plot. Please try again.");
    }
}

        async function syncPlotsData() {
            console.log("Sync active... Requesting language parameter: " + activeLanguage);
            try {
                const response = await fetch(`${API_BASE_URL}/api/plots?lang=${activeLanguage}`);
                if (!response.ok) throw new Error("HTTP error " + response.status);
                
                const plots = await response.json();
                const container = document.getElementById('plots-container');
                
                if (container) {
                    container.innerHTML = ""; // Wipe container cleanly
                    
                    plots.forEach(plot => {
                        const card = document.createElement('div');
                        card.className = 'plot-card';
                        
                        let cropLabel = plot.crop;
                        if (plot.crop.toLowerCase() === 'sugarcane') {
                            if (activeLanguage === 'kn') cropLabel = 'ಕಬ್ಬು';
                            else if (activeLanguage === 'te') cropLabel = 'చెరకు';
                            else if (activeLanguage === 'mr') cropLabel = 'ऊस';
                        }

                        // Localized string headers for inside the card loop
                        const detailsHeader = { en: "Acreage", kn: "ಪ್ರದೇಶ", mr: "क्षेत्र", te: "వైశాల్యం" }[activeLanguage] || "Acreage";
                        const dateHeader = { en: "Date", kn: "ದಿನಾಂಕ", mr: "तारीख", te: "తేదీ" }[activeLanguage] || "Date";
                        const unitHeader = { en: "acres", kn: "ಎಕರೆಗಳು", mr: "एकर", te: "ఎకరాలు" }[activeLanguage] || "acres";

                        card.innerHTML = `
                            <h3><strong>${plot.owner_name}</strong> — ${cropLabel}</h3>
                            <p style="color: #666; font-size: 13px;">📖 ${detailsHeader}: ${plot.acreage} ${unitHeader} | 📅 ${dateHeader}: ${plot.date}</p>
                            <div class="advisory-box">
                                ${plot.advisory}
                            </div>
                        `;
                        container.appendChild(card);
                    });
                }
            } catch (error) {
                console.error("Sync loop error:", error);
            }
        }

        // Initialize background loops and default view settings
        setLanguage('en');
        setInterval(syncPlotsData, 8000);
    </script>
</body>
</html>
